# ===========================================================================
# Prod profile — live production environment
# ===========================================================================
# Activate:  export SPRING_PROFILES_ACTIVE=prod
#
# ALL secrets are required via environment variables.
# The application will FAIL TO START if any are missing.
# ===========================================================================

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 1200000

  jwt:
    secret: ${JWT_SECRET}

  # Devtools excluded from fat JAR by default; defensive override in case it leaks onto classpath
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

app:
  cors:
    allowed-origin-patterns: ${CORS_ORIGIN}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

server:
  compression:
    enabled: true
    mime-types: application/json,text/html,text/plain,application/javascript
  tomcat:
    accesslog:
      enabled: true
      prefix: access
      suffix: .log
      pattern: "%h %l %u %t \"%r\" %s %b %D"

logging:
  level:
    com.marakicode.financetracker: WARN
    root: ERROR
