# ===========================================================================
# Dev profile — local developer machines
# ===========================================================================
# Activate:  export SPRING_PROFILES_ACTIVE=dev
#
# Uses a local PostgreSQL instance. Override defaults via env vars:
#   export DB_URL=jdbc:postgresql://localhost:5432/financetracker_dev
#   export DB_USERNAME=postgres
#   export DB_PASSWORD=your-local-password
#   export JWT_SECRET=your-dev-secret
#   export CORS_ORIGIN=http://localhost:3000
# ===========================================================================

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/financetracker}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true

  flyway:
    baseline-on-migrate: true

  # JWT dev fallback — safe for local use only, never use in stag/prod
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

app:
  cors:
    allowed-origin-patterns: ${CORS_ORIGIN:http://localhost:3000}
  admin:
    initializer:
      enabled: true

logging:
  level:
    com.marakicode.financetracker: DEBUG
