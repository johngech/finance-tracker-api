# ===========================================================================
# Shared configuration — inherited by ALL Spring profiles
# ===========================================================================
# Activate a profile via env var or JVM arg:
#   export SPRING_PROFILES_ACTIVE=dev
#   java -Dspring.profiles.active=prod -jar app.jar
#
# Environment-specific values (datasource, JWT secret, CORS origins) are
# defined in application-{profile}.yaml and MUST NOT appear here.
# ===========================================================================

spring:
  application:
    name: financetracker

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jwt:
    access-token-expiration: 900000
    refresh-token-expiration: 604800000

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8080

app:
  cors:
    allowed-methods: GET,POST,PATCH,PUT,DELETE,HEAD,OPTIONS
    allowed-headers: Content-Type,Authorization,X-Requested-With
    allow-credentials: true
    max-age: 3600
