name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Build & Test — always runs (PR + main push)
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn compile -q

      - name: Run tests
        run: mvn test -q

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: JUnit Tests
          path: target/surefire-reports/TEST-*.xml
          reporter: java-junit

  # ─────────────────────────────────────────────
  # Gitleaks — secret detection (PR + main push)
  # ─────────────────────────────────────────────
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # OWASP Dependency-Check — CVE scan (main only)
  # ─────────────────────────────────────────────
  owasp-scan:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Cache OWASP Dependency-Check NVD database
        uses: actions/cache@v6
        with:
          path: ~/.dependency-check/data
          key: owasp-nvd-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: Verify NVD API Key
        run: |
          if [ -z "$NVD_API_KEY" ]; then
            echo "NVD_API_KEY is missing"
            exit 1
          fi
          echo "NVD_API_KEY is present"
          echo "Length: ${#NVD_API_KEY}"
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Run OWASP Dependency-Check
        run: mvn dependency-check:check -DnvdApiKey="$NVD_API_KEY" -q
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check/
          retention-days: 14

  # ─────────────────────────────────────────────
  # SpotBugs + FindSecBugs — code analysis (main only)
  # ─────────────────────────────────────────────
  spotbugs-scan:
    name: SpotBugs / FindSecBugs
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run SpotBugs check
        run: mvn compile test-compile spotbugs:check -q

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: |
            target/spotbugsXml.xml
            target/spotbugs.html
          retention-days: 14
